apiVersion: 1

datasources:
  # --- 1. WAZUH INDEXER (Alertas via OpenSearch) ---
  - name: Wazuh-Data
    type: grafana-opensearch-datasource
    access: proxy
    url: https://wazuh.colektia.space:9200
    basicAuth: true
    basicAuthUser: Grafana_RO
    secureJsonData:
      basicAuthPassword: "WAZUH_PASS_SECRET"
    jsonData:
      timeField: "@timestamp"
      tlsSkipVerify: true
      version: "2.0.0"
      database: "wazuh-alerts-*"

  # --- 2. ACTION1 API ---
  - name: Action1-API
    type: yesoreyeram-infinity-datasource
    access: proxy
    jsonData:
      auth_method: "apiKey"
      api_key_type: "header"
      api_key_key: "Authorization"
    secureJsonData:
      api_key_value: "ACTION1_API_KEY_SECRET"

  # --- 3. HARDWARE (Prometheus) ---
  - name: Prometheus-Infra
    type: prometheus
    access: proxy
    url: http://prometheus:9090