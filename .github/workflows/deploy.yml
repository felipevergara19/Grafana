name: Deploy to Linode

on:
  push:
    branches:
      - main

jobs:
  security_scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Yaml Lint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: "."
          config_file: ".yamllint"

      - name: Run Trivy vulnerability scanner (Repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Deploy to Server
    needs: security_scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "--- DEBUG INFO ---"
            echo "Usuario: $(whoami)"
            echo "Home: $HOME"
            echo "PWD: $(pwd)"
            echo "Listando carpeta actual:"
            ls -la

            # Intentar encontrar la carpeta Grafana sin importar mayúsculas
            PROJECT_ROOT=$(find $HOME /root /home -maxdepth 2 -iname "Grafana" -type d 2>/dev/null | head -n 1)

            if [ -z "$PROJECT_ROOT" ]; then
              echo "!!! ERROR: No se encontró la carpeta Grafana en $HOME, /root o /home."
              echo "Intentando encontrarla en todo el sistema (esto puede tardar)..."
              PROJECT_ROOT=$(find / -maxdepth 4 -iname "Grafana" -type d 2>/dev/null | head -n 1)
            fi

            if [ -z "$PROJECT_ROOT" ]; then
              echo "!!! ERROR CRITICAL: Carpeta Grafana no encontrada."
              exit 1
            fi

            echo "Directorio encontrado: $PROJECT_ROOT"
            cd "$PROJECT_ROOT"

            git pull origin main

            # Crear .env
            echo "DOMAIN_NAME=${{ secrets.DOMAIN_NAME }}" > .env
            echo "GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER }}" >> .env
            echo "GRAFANA_ADMIN_PASS=${{ secrets.GRAFANA_ADMIN_PASS }}" >> .env
            echo "GOOGLE_ALLOWED_DOMAIN=${{ secrets.GOOGLE_ALLOWED_DOMAIN }}" >> .env
            echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
            echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
            echo "WAZUH_URL=${{ secrets.WAZUH_URL }}" >> .env
            echo "WAZUH_USER=${{ secrets.WAZUH_USER }}" >> .env
            echo "WAZUH_PASS=${{ secrets.WAZUH_PASS }}" >> .env
            echo "WAZUH_MANAGER_URL=${{ secrets.WAZUH_MANAGER_URL }}" >> .env
            echo "ACTION1_API_KEY=${{ secrets.ACTION1_API_KEY }}" >> .env
            echo "SSL_EMAIL=${{ secrets.SSL_EMAIL }}" >> .env

            # Usar docker compose (v2) o docker-compose (v1)
            if command -v docker-compose >/dev/null 2>&1; then
              docker-compose up -d --force-recreate
            else
              docker compose up -d --force-recreate
            fi
